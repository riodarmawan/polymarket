[runtime]
environment = "development"
mode = "paper"
strategy_version = "btc-updown-v2"

[risk]
max_open_positions = 1
max_order_usd = 0.50
max_daily_orders = 24
max_daily_realized_loss_usd = 2.0
max_drawdown = 0.20
max_consecutive_losses = 5
max_spread = 0.04
max_data_age_ms = 15000

[execution]
order_type = "FOK"
heartbeat_interval_secs = 5
reconcile_before_ready = true
cancel_on_shutdown = true

[storage]
database_path = "data/trading.db"
backup_directory = "data/backups"

[dashboard]
bind = "127.0.0.1:3001"
allow_live_mode_changes = false

[general]
initial_capital = 2.0
max_positions = 4
log_level = "info"
data_dir = "data"

[trading]
strategy = "last_minute"
max_hours_to_resolution = 8760.0
min_confidence = 0.7
sort_by = "deadline"

[api]
gamma_base_url = "http://localhost:3000"
clob_base_url = "http://localhost:3000"
timeout_secs = 30

[orderbook]
max_spread_pct = 0.04
min_depth = 1000
min_volume_24h = 10000

[probability]
prior_weight = 0.3
news_weight = 0.25
polling_weight = 0.15
expert_weight = 0.20
historical_weight = 0.10

[expected_value]
cost_per_trade_pct = 0.02
min_ev_threshold = 0.05
min_edge_pct = 0.10

[position_sizing]
kelly_fraction = 0.125
max_position_pct = 0.25
min_position_usd = 0.50
max_position_usd = 0.50

[exit]
take_profit_pct = 0.30
stop_loss_pct = 0.20
trailing_stop_pct = 0.10

[collector]
interval_secs = 300
max_markets = 50
filter_resolved = false
sort_by = "deadline"

[backtesting]
default_period_days = 30
initial_capital = 1000.0

[paper_trading]
enabled = true
dry_run = true

[crypto]
enabled = true
initial_capital = 2.0
min_order_usd = 0.50
max_trades_per_hour = 1
min_confidence = 0.6
timeframes = ["5m", "15m", "1h"]
