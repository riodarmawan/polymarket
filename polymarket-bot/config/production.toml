[runtime]
environment = "production"
mode = "paper"
strategy_version = "btc-updown-v2"

[risk]
trading_enabled = true
enable_5m = true
enable_15m = true
max_open_positions = 1
max_order_usd = 4.00
max_daily_orders = 3
max_daily_realized_loss_usd = 0.30
max_drawdown = 0.20
max_consecutive_losses = 3
max_spread = 0.04
max_data_age_ms = 15000
min_balance_reserve_usd = 0.20
max_fee_rate_bps = 1000

[execution]
order_type = "FOK"
heartbeat_interval_secs = 5
reconcile_before_ready = true
cancel_on_shutdown = true

[storage]
database_path = "data-production/trading.db"
backup_directory = "data-production/backups"

[dashboard]
bind = "127.0.0.1:3001"
allow_live_mode_changes = false

[general]
initial_capital = 7.50
max_positions = 1
log_level = "info"
data_dir = "data-production"

[api]
# This host's WSL network cannot reach the Cloudflare-backed APIs directly.
# The local release proxy forwards these public market-data requests.
gamma_base_url = "http://localhost:3000"
clob_base_url = "http://localhost:3000"
timeout_secs = 10

[orderbook]
max_spread_pct = 0.04
min_depth = 0.10
min_volume_24h = 0

[expected_value]
cost_per_trade_pct = 0.02
min_ev_threshold = 0.08
min_edge_pct = 0.10

[position_sizing]
kelly_fraction = 0.0
max_position_pct = 0.50
min_position_usd = 0.50
max_position_usd = 4.00

[trading]
max_hours_to_resolution = 720

[paper_trading]
enabled = true
dry_run = true

[crypto]
enabled = true
initial_capital = 7.50
min_order_usd = 0.50
max_trades_per_hour = 3
min_confidence = 0.70
timeframes = ["5m", "15m"]
